<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kotryna Creates · Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:ital,wght@0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=new-title@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .project-page { padding-top: 120px; padding-bottom: 80px; }

    .project-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700; color: var(--grey);
      letter-spacing: -0.02em; margin-bottom: 48px;
      transition: color 0.2s;
    }
    .project-back:hover { color: var(--navy); }
    .project-back svg { width: 18px; height: 18px; }

    .project-header { margin-bottom: 56px; }
    .project-meta {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .project-cat {
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--grey);
      background: var(--bg); padding: 5px 12px; border-radius: 100px;
    }
    .project-year {
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--lgrey);
    }
    .project-title {
      font-family: var(--font-title);
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.05; letter-spacing: -0.03em;
      color: var(--navy); margin-bottom: 20px;
    }
    .project-desc {
      font-size: 18px; line-height: 1.65; color: var(--grey);
      max-width: 640px;
    }

    /* Images — full width stacked, just like Adobe Portfolio */
    .project-images {
      display: flex; flex-direction: column; gap: 6px;
    }
    .project-images img {
      width: 100%; height: auto; display: block;
      border-radius: 4px;
    }

    /* Grid layout — 3 columns, used for book spread projects */
    .project-images--grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .project-images--grid img {
      width: 100%; height: auto; display: block;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(3,15,46,0.10);
    }
    /* Last row: if only 2 items remain, centre them */
    .project-images--grid img:last-child:nth-child(3n - 1) {
      grid-column: 2 / 3;
    }
    .project-images--grid img:last-child:nth-child(3n - 2) {
      grid-column: 2 / 3;
    }

    /* Nav — same pill but with back link instead of section links */
    .nav-project-pill {
      pointer-events: all;
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 20px 32px rgba(3,15,46,0.1);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 32px; width: 100%; max-width: 900px;
    }
    .nav-project-pill a {
      font-weight: 700; font-size: 15px; letter-spacing: -0.03em;
      color: var(--navy); display: flex; align-items: center; gap: 8px;
    }
    .nav-project-pill a:hover { opacity: 0.7; }
  </style>
</head>
<body>

  <!-- NAV -->
  <header class="nav-wrap">
    <div class="nav-project-pill">
      <a href="index.html">
        <div class="nav-logo-icon"><img src="images/logo.png" alt="K" style="width:28px;height:28px;border-radius:8px"></div>
        Kotryna Creates
      </a>
      <a href="index.html#work" style="font-size:14px;color:var(--grey)">← Back to work</a>
    </div>
  </header>

  <main class="project-page">
    <div class="container" id="proj-container" style="max-width:900px">

      <div class="project-header">
        <div class="project-meta">
          <span class="project-cat" id="proj-cat"></span>
          <span class="project-year" id="proj-year"></span>
        </div>
        <h1 class="project-title" id="proj-title"></h1>
        <p class="project-desc" id="proj-desc"></p>
      </div>

      <div class="project-images" id="proj-images"></div>

    </div>
  </main>

  <footer style="padding:48px 24px;text-align:center;font-size:13px;color:var(--lgrey)">
    © Kotryna Baniulytė · <a href="https://www.instagram.com/kotryna.creates" target="_blank" style="color:var(--grey);font-weight:600">Instagram</a>
  </footer>

  <script>
    const projects = {
      beribu:           { name: 'Beribu',                          year: '2023', cat: 'Brand Identity',     images: ['images/beribu/cover.png','images/beribu/1.png','images/beribu/2.png','images/beribu/3.png','images/beribu/4.png','images/beribu/5.png','images/beribu/6.png','images/beribu/7.png','images/beribu/8.png'], desc: '' },
      kelioniu:         { name: 'Kelioniu akademija',              year: '2025', cat: 'Visual Identity',    images: ['images/kelioniu/cover.png','images/kelioniu/1.png','images/kelioniu/2.png','images/kelioniu/3.png','images/kelioniu/4.png','images/kelioniu/5.png','images/kelioniu/6.png'], desc: '' },
      bite:             { name: 'Romainiu odontologijos klinika',  year: '2024', cat: 'Brand Identity',     images: ['images/bite/cover.jpg','images/bite/1.png','images/bite/2.jpg','images/bite/3.jpg','images/bite/4.jpg','images/bite/5.jpg','images/bite/6.jpg','images/bite/7.jpg','images/bite/8.jpg','images/bite/9.png'], desc: '' },
      zoo:              { name: 'Lithuanian Zoo',                  year: '2023', cat: 'Illustration',       images: ['images/zoo/cover.png','images/zoo/1.png','images/zoo/2.png','images/zoo/3.png','images/zoo/4.png','images/zoo/5.jpg','images/zoo/6.jpg'], desc: '' },
      doa:              { name: 'Disputes over Access',            year: '2023', cat: 'Book Cover',         images: ['images/disputes/cover.png','images/disputes/1.png','images/disputes/2.png','images/disputes/3.png','images/disputes/4.png','images/disputes/5.png'], desc: 'Book cover for a journalist practice study.' },
      'visual-identity':{ name: 'Kotryna Creates',                year: '2025', cat: 'Visual Identity',    images: ['images/visual-identity/cover.png','images/visual-identity/1.png','images/visual-identity/2.png','images/visual-identity/3.png','images/visual-identity/4.png','images/visual-identity/5.png','images/visual-identity/6.png','images/visual-identity/7.png','images/visual-identity/8.png','images/visual-identity/9.png'], desc: 'Personal logo and visual identity system.' },
      jaunimo:          { name: 'Jaunimo linija',                  year: '2022', cat: 'Book Design',        images: ['images/jaunimo/cover.png','images/jaunimo/1.png','images/jaunimo/2.png','images/jaunimo/3.png','images/jaunimo/4.png','images/jaunimo/5.png','images/jaunimo/6.png','images/jaunimo/7.png'], desc: 'Exercise book design.', layout: 'grid' },
      livoliukai:       { name: 'Livoliukai',                      year: '2022', cat: 'Brand Identity',     images: ['images/livoliukai/cover.jpg','images/livoliukai/1.png','images/livoliukai/2.png','images/livoliukai/3.png','images/livoliukai/4.png','images/livoliukai/5.png','images/livoliukai/6.png','images/livoliukai/7.png','images/livoliukai/8.png'], desc: '' },
      typeface:         { name: 'Handmade Typeface',               year: '2019', cat: 'Typography',         images: ['images/typeface/cover.jpg','images/typeface/1.jpg','images/typeface/2.jpg','images/typeface/3.jpg','images/typeface/4.jpg','images/typeface/5.jpg'], desc: '' },
      muziejus:         { name: 'Lietuvos etnografijos muziejus',  year: '2024', cat: 'Visual Identity',    images: ['images/muziejus/cover.jpeg','images/muziejus/1.jpeg','images/muziejus/2.jpeg','images/muziejus/3.jpeg','images/muziejus/4.jpeg','images/muziejus/5.png'], desc: '' },
      ekosanus:         { name: 'EKOsanus',                        year: '2021', cat: 'Logo & Packaging',   images: ['images/ekosanus/cover.png','images/ekosanus/1.jpg','images/ekosanus/1.png','images/ekosanus/2.png','images/ekosanus/3.png','images/ekosanus/4.png','images/ekosanus/5.png','images/ekosanus/6.png','images/ekosanus/7.png'], desc: "Logo and packaging for brewer's yeast." },
      orkla:            { name: 'Orkla care',                      year: '2024', cat: 'Design',             images: ['images/orkla/cover.png','images/orkla/1.png','images/orkla/2.png','images/orkla/3.png','images/orkla/5.jpg','images/orkla/6.png','images/orkla/7.png','images/orkla/8.png','images/orkla/9.jpg','images/orkla/10.png'], desc: '' },
      vom:              { name: 'VOM Baltics',                     year: '2022', cat: 'Design',             images: ['images/vom/cover.jpg','images/vom/1.jpg','images/vom/3.jpg','images/vom/4.jpg','images/vom/5.jpg','images/vom/6.jpg','images/vom/7.jpg','images/vom/8.jpg','images/vom/9.jpg','images/vom/10.jpg','images/vom/11.jpg','images/vom/12.jpg'], desc: '' },
      tshirts:          { name: 'T-shirt designs',                 year: '2023', cat: 'Illustration',       images: ['images/tshirts/cover.png','images/tshirts/1.png','images/tshirts/2.png','images/tshirts/3.png','images/tshirts/4.png','images/tshirts/5.png'], desc: '' },
    };

    const key = new URLSearchParams(window.location.search).get('p');
    const p   = projects[key];

    if (!p) {
      document.title = 'Project not found · Kotryna Creates';
      document.getElementById('proj-title').textContent = 'Project not found.';
    } else {
      document.title = `${p.name} · Kotryna Creates`;
      document.getElementById('proj-cat').textContent  = p.cat;
      document.getElementById('proj-year').textContent = p.year;
      document.getElementById('proj-title').textContent = p.name;
      if (p.desc) document.getElementById('proj-desc').textContent = p.desc;

      const imgEl = document.getElementById('proj-images');
      if (p.layout === 'grid') {
        imgEl.classList.add('project-images--grid');
        document.getElementById('proj-container').style.maxWidth = '1200px';
      }
      imgEl.innerHTML = p.images.map(src => `<img src="${src}" alt="${p.name}" loading="lazy">`).join('');
    }
  </script>

</body>
</html>
