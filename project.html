<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kotryna Creates · Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:ital,wght@0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=new-title@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--blue-bg); }

    /* ── NAV (project variant) ── */
    .nav-project-pill {
      pointer-events: all;
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 20px 32px rgba(3,15,46,0.1);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 32px; width: 100%; max-width: 900px;
    }
    .nav-project-pill .nav-logo { font-size: 15px; }
    .nav-project-pill .nav-back {
      font-size: 14px; font-weight: 700; color: var(--grey);
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 100px;
      transition: background 0.2s, color 0.2s;
    }
    .nav-project-pill .nav-back:hover { background: var(--bg); color: var(--navy); }

    /* ── PAGE ── */
    .project-page { padding-top: 140px; padding-bottom: 40px; }
    .project-wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    .project-header {
      max-width: 760px; margin: 0 auto 64px;
      text-align: center; display: flex; flex-direction: column; align-items: center;
    }
    .project-meta {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-bottom: 18px;
    }
    .project-cat {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--navy);
      background: var(--yellow); padding: 7px 16px; border-radius: 100px;
      box-shadow: 0 4px 16px rgba(3,15,46,0.08);
    }
    .project-year {
      font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--yellow);
    }
    .project-title {
      font-family: var(--font-title);
      font-size: clamp(40px, 7vw, 88px);
      line-height: 0.98; letter-spacing: -0.03em;
      color: var(--navy); margin-bottom: 24px;
    }
    .project-desc {
      font-size: 19px; line-height: 1.7; color: var(--navy);
      font-weight: 500; max-width: 640px;
    }

    /* ── GALLERY ITEM (shared by both layouts) ── */
    .gallery-item {
      border-radius: 20px; overflow: hidden;
      background: var(--white);
      box-shadow: 0 10px 36px rgba(3,15,46,0.12);
      cursor: zoom-in; position: relative;
      transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.35s;
      opacity: 0; transform: translateY(28px);
    }
    .gallery-item.in { opacity: 1; transform: translateY(0); }
    .gallery-item:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 18px 48px rgba(3,15,46,0.22);
    }
    .gallery-item img { width: 100%; height: auto; display: block; }
    .gallery-item::after {
      content: ""; position: absolute; inset: 0;
      background: rgba(3,15,46,0); transition: background 0.3s;
      pointer-events: none;
    }
    .gallery-item:hover::after { background: rgba(3,15,46,0.06); }

    /* ── ROW-BASED LAYOUT (custom per project) ── */
    .rows { display: flex; flex-direction: column; gap: 18px; }
    .row { display: flex; gap: 18px; align-items: flex-start; }
    .row .gallery-item { flex: 1 1 0; min-width: 0; }
    /* equal-height row: every image is matched to the height of the shortest
       (the wide spreads). Taller/portrait images keep their exact proportions —
       they just become narrower and sit centered. No cropping, no white bars.
       Heights are set in JS (equalizeRows). */
    .row--equal { justify-content: center; align-items: flex-start; }
    .row--equal .gallery-item { flex: 0 0 auto; }
    .row--equal .gallery-item img { width: auto; max-width: 100%; }

    /* plain: no card — transparent, no shadow/border (for cut-out character shots) */
    .gallery-item--plain { background: none; box-shadow: none; border-radius: 0; }
    .gallery-item--plain::after { display: none; }
    .gallery-item--plain:hover { transform: translateY(-4px); box-shadow: none; }

    /* bleed: break out of the container so the image reads bigger */
    .row--bleed { width: 100vw; margin-left: calc(50% - 50vw); justify-content: center; }
    .row--bleed .gallery-item { flex: 0 1 auto; }
    .row--bleed .gallery-item img { width: 100%; max-width: 1500px; margin: 0 auto; }

    /* ── MASONRY GALLERY (default fallback) ── */
    .gallery { column-count: 3; column-gap: 18px; }
    .gallery .gallery-item { break-inside: avoid; margin-bottom: 18px; }

    @media (max-width: 900px) {
      .gallery { column-count: 2; }
      .row { flex-wrap: wrap; }
      .row .gallery-item { flex: 1 1 calc(50% - 9px); }
    }
    @media (max-width: 560px) {
      .gallery { column-count: 1; }
      .row { flex-direction: column; }
    }

    /* ── PREV / NEXT NAV ── */
    .project-nav {
      max-width: 1200px; margin: 80px auto 0; padding: 0 24px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .project-nav a {
      display: flex; flex-direction: column; gap: 6px;
      background: var(--white); border-radius: 24px;
      padding: 28px 32px; transition: transform 0.25s, box-shadow 0.25s;
      box-shadow: 0 8px 28px rgba(3,15,46,0.10);
    }
    .project-nav a:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(3,15,46,0.18); }
    .project-nav .pn-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(3,15,46,0.45);
    }
    .project-nav .pn-name {
      font-family: var(--font-title); font-size: clamp(20px, 2.4vw, 30px);
      letter-spacing: -0.02em; color: var(--navy); line-height: 1.05;
    }
    .project-nav .pn-next { text-align: right; align-items: flex-end; }

    @media (max-width: 560px) {
      .project-nav { grid-template-columns: 1fr; }
      .project-nav .pn-next { text-align: left; align-items: flex-start; }
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      background: rgba(3,15,46,0.92); backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lb-img {
      max-width: 88vw; max-height: 86vh; object-fit: contain;
      border-radius: 10px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      transform: scale(0.96); transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
      user-select: none;
    }
    .lightbox.open .lb-img { transform: scale(1); }

    .lb-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); transition: background 0.2s, transform 0.2s;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.25); }
    .lb-btn:active { transform: translateY(-50%) scale(0.92); }
    .lb-btn svg { width: 26px; height: 26px; }
    .lb-prev { left: 24px; }
    .lb-next { right: 24px; }

    .lb-close {
      position: absolute; top: 24px; right: 24px;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--white); font-size: 20px; transition: background 0.2s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.25); }

    .lb-counter {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 100px;
    }

    @media (max-width: 560px) {
      .lb-btn { width: 44px; height: 44px; }
      .lb-prev { left: 10px; } .lb-next { right: 10px; }
      .lb-img { max-width: 94vw; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <header class="nav-wrap">
    <div class="nav-project-pill">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon"><img src="images/logo.png" alt="K"></div>
        Kotryna Creates
      </a>
      <a href="index.html#work" class="nav-back">← Back to work</a>
    </div>
  </header>

  <main class="project-page">
    <div class="project-wrap">

      <div class="project-header">
        <div class="project-meta">
          <span class="project-cat" id="proj-cat"></span>
          <span class="project-year" id="proj-year"></span>
        </div>
        <h1 class="project-title" id="proj-title"></h1>
        <p class="project-desc" id="proj-desc"></p>
      </div>

      <div class="gallery" id="gallery"></div>

    </div>

    <nav class="project-nav" id="project-nav"></nav>
  </main>

  <footer style="padding:48px 24px;text-align:center;font-size:13px;color:rgba(3,15,46,0.5)">
    © Kotryna Baniulytė · <a href="https://www.instagram.com/kotryna.creates" target="_blank" style="color:var(--navy);font-weight:600">Instagram</a>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
    <button class="lb-btn lb-prev" id="lb-prev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <img class="lb-img" id="lb-img" src="" alt="">
    <button class="lb-btn lb-next" id="lb-next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <script>
    const PLACEHOLDER_DESC = "Short project description goes here — a sentence or two about the brief, the idea behind it, and what was created. (Placeholder — to be replaced.)";

    const projects = {
      beribu:           { name: 'Beribu',                          year: '2023', cat: 'Brand Identity',     images: ['images/beribu/cover.png','images/beribu/1.png','images/beribu/2.png','images/beribu/3.png','images/beribu/4.png','images/beribu/5.png','images/beribu/6.png','images/beribu/7.png','images/beribu/8.png'], desc: '' },
      kelioniu:         { name: 'Kelioniu akademija',              year: '2025', cat: 'Visual Identity',    images: ['images/kelioniu/cover.png','images/kelioniu/1.png','images/kelioniu/2.png','images/kelioniu/3.png','images/kelioniu/4.png','images/kelioniu/5.png','images/kelioniu/6.png'], desc: '' },
      bite:             { name: 'Romainiu odontologijos klinika',  year: '2024', cat: 'Brand Identity',     images: ['images/bite/cover.jpg','images/bite/1.png','images/bite/2.jpg','images/bite/3.jpg','images/bite/4.jpg','images/bite/5.jpg','images/bite/6.jpg','images/bite/7.jpg','images/bite/8.jpg','images/bite/9.png'], desc: '' },
      zoo:              { name: 'Lithuanian Zoo',                  year: '2023', cat: 'Illustration',       images: ['images/zoo/cover.png','images/zoo/1.png','images/zoo/2.png','images/zoo/3.png','images/zoo/4.png','images/zoo/5.jpg','images/zoo/6.jpg'], desc: '' },
      doa:              { name: 'Disputes over Access',            year: '2023', cat: 'Book Design',        images: ['images/disputes/cover.png','images/disputes/1.png','images/disputes/2.png','images/disputes/3.png','images/disputes/4.png','images/disputes/5.png'], desc: "Book cover and design for a Journalist Practice Study. The \"Disputes over Access\" study examines the efficiency of journalists' Access to Information mechanisms in Estonia, Latvia, and Lithuania and seeks to provide a basis for policy change that would lead to improved sustainability within journalism in the Baltic States. The investigators that worked on the study employed various methods during its production, including desk research, case studies and comparative analysis. Therefore the design of this book was carefully created so it could represent the importance of the study and also be appealing to the eye of the reader by using colours, bold typography and graphic elements.", layout: [[1,2],[3,5],[4]] },
      'visual-identity':{ name: 'Kotryna Creates',                year: '2025', cat: 'Brand Identity',     images: ['images/visual-identity/cover.png','images/visual-identity/1.png','images/visual-identity/2.png','images/visual-identity/3.png','images/visual-identity/4.png','images/visual-identity/5.png','images/visual-identity/6.png','images/visual-identity/7.png','images/visual-identity/8.png','images/visual-identity/9.png'], desc: 'Personal logo and visual identity system.' },
      jaunimo:          { name: 'Jaunimo linija',                  year: '2022', cat: 'Book Design',        images: ['images/jaunimo/cover.png','images/jaunimo/1.png','images/jaunimo/2.png','images/jaunimo/3.png','images/jaunimo/4.png','images/jaunimo/5.png','images/jaunimo/6.png','images/jaunimo/7.png'], desc: 'Exercise book design for "Jaunimo linija". Inspired by the energy and spirit of youth, this exercise book design seamlessly blends functionality with aesthetics to create a visually engaging and motivating tool for learning and self-improvement. The design concept revolves around the idea of fostering creativity and personal development among the youth. Bright colors, modern typography, and playful illustrations come together to inject a sense of excitement and vitality into the exercise book, making it not just a tool for practical use, but also a source of inspiration and expression.', layout: [[0],[1],[2],[3,4],{ items: [5,6,7], equal: true }] },
      livoliukai:       { name: 'Livoliukai',                      year: '2022', cat: 'Illustration',       images: ['images/livoliukai/cover.jpg','images/livoliukai/1.png','images/livoliukai/2.png','images/livoliukai/3.png','images/livoliukai/4.png','images/livoliukai/5.png','images/livoliukai/6.png','images/livoliukai/7.png','images/livoliukai/8.png'], desc: 'Illustrations for children\'s book "Kaip žuvytė Moli ir superherojai livoliukai apsaugojo Geranitetą?". It\'s a captivating children\'s book created to teach young readers about the importance of health and their immune system. Through an engaging narrative and vibrant illustrations, this book introduces key concepts of wellness in a fun and accessible way for young readers.', layout: [{ items: [1], plain: true }, [7,2,3], [4,5,6], { items: [8], plain: true }] },
      typeface:         { name: 'Handmade Typeface',               year: '2019', cat: 'Illustration',       images: ['images/typeface/cover.jpg','images/typeface/1.jpg','images/typeface/2.jpg','images/typeface/3.jpg','images/typeface/4.jpg','images/typeface/5.jpg'], desc: '' },
      muziejus:         { name: 'Lietuvos etnografijos muziejus',  year: '2024', cat: 'Illustration',       images: ['images/muziejus/cover.jpeg','images/muziejus/1.jpeg','images/muziejus/2.jpeg','images/muziejus/3.jpeg','images/muziejus/4.jpeg','images/muziejus/5.png'], desc: '' },
      ekosanus:         { name: 'EKOsanus',                        year: '2021', cat: 'Packaging Design',   images: ['images/ekosanus/cover.png','images/ekosanus/1.jpg','images/ekosanus/1.png','images/ekosanus/2.png','images/ekosanus/3.png','images/ekosanus/4.png','images/ekosanus/5.png','images/ekosanus/6.png','images/ekosanus/7.png'], desc: "Logo and packaging for brewer's yeast." },
      orkla:            { name: 'Orkla care',                      year: '2024', cat: 'Advertising & Digital', images: ['images/orkla/cover.png','images/orkla/1.png','images/orkla/2.png','images/orkla/3.png','images/orkla/5.jpg','images/orkla/6.png','images/orkla/7.png','images/orkla/8.png','images/orkla/9.jpg','images/orkla/10.png'], desc: '' },
      vom:              { name: 'VOM Baltics',                     year: '2022', cat: 'Advertising & Digital', images: ['images/vom/cover.jpg','images/vom/1.jpg','images/vom/3.jpg','images/vom/4.jpg','images/vom/5.jpg','images/vom/6.jpg','images/vom/7.jpg','images/vom/8.jpg','images/vom/9.jpg','images/vom/10.jpg','images/vom/11.jpg','images/vom/12.jpg'], desc: '' },
      tshirts:          { name: 'T-shirt designs',                 year: '2023', cat: 'Illustration',       images: ['images/tshirts/cover.png','images/tshirts/1.png','images/tshirts/2.png','images/tshirts/3.png','images/tshirts/4.png','images/tshirts/5.png'], desc: '' },
    };

    const order = Object.keys(projects);
    const key   = new URLSearchParams(window.location.search).get('p');
    const p     = projects[key];

    if (!p) {
      document.title = 'Project not found · Kotryna Creates';
      document.getElementById('proj-title').textContent = 'Project not found.';
    } else {
      // ── Header ──
      document.title = `${p.name} · Kotryna Creates`;
      document.getElementById('proj-cat').textContent   = p.cat;
      document.getElementById('proj-year').textContent  = p.year;
      document.getElementById('proj-title').textContent = p.name;
      document.getElementById('proj-desc').textContent  = p.desc || PLACEHOLDER_DESC;

      // ── Gallery ──
      // A project can define a custom `layout`: an array of rows,
      // each row being a list of image indices (1 = full width, 2 = pair, 3 = trio).
      // Without a layout, it falls back to the masonry grid.
      const gallery = document.getElementById('gallery');
      // `shown` = the image indices actually displayed, in order. The lightbox
      // only browses these, so any image left out of the layout never appears.
      const shown = [];
      const item = (i, plain) => `<div class="gallery-item${plain ? ' gallery-item--plain' : ''}" data-i="${i}"><img src="${p.images[i]}" alt="${p.name} — image ${i+1}" loading="lazy"></div>`;

      if (Array.isArray(p.layout)) {
        gallery.classList.remove('gallery'); gallery.classList.add('rows');
        gallery.innerHTML = p.layout.map(row => {
          const isObj = !Array.isArray(row);
          const arr   = isObj ? row.items : row;
          let cls = 'row';
          if (isObj && row.equal) cls += ' row--equal';
          if (isObj && row.bleed) cls += ' row--bleed';
          const plain = isObj && row.plain;
          arr.forEach(i => shown.push(i));
          return `<div class="${cls}">${arr.map(i => item(i, plain)).join('')}</div>`;
        }).join('');
      } else {
        // Auto gallery: show every image EXCEPT the cover (index 0),
        // which is reserved as the project's cover thumbnail.
        p.images.forEach((_, i) => { if (i > 0) shown.push(i); });
        gallery.innerHTML = shown.map(i => item(i)).join('');
      }
      const shownSrcs = shown.map(i => p.images[i]);

      // ── Equal-height rows ──
      // Match every image in a .row--equal to the SHORTEST image's height
      // (the wide spreads), keeping each image's own proportions intact.
      function equalizeRows() {
        gallery.querySelectorAll('.row--equal').forEach(row => {
          const imgs = [...row.querySelectorAll('img')];
          if (imgs.some(im => !im.complete || !im.naturalWidth)) return;
          // reset to natural so we can measure true heights at column width
          imgs.forEach(im => { im.style.height = ''; im.style.width = ''; im.parentElement.style.flex = '1 1 0'; });
          const h = Math.min(...imgs.map(im => im.clientHeight));
          imgs.forEach(im => { im.parentElement.style.flex = '0 0 auto'; im.style.height = h + 'px'; im.style.width = 'auto'; });
        });
      }
      window.addEventListener('resize', equalizeRows);

      // staggered reveal as items load / scroll in
      const items = [...gallery.querySelectorAll('.gallery-item')];
      // run equalize once each image finishes loading (and once now, in case cached)
      items.forEach(el => {
        const im = el.querySelector('img');
        if (im.complete) equalizeRows();
        else im.addEventListener('load', equalizeRows);
      });
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const el = e.target;
            const delay = (+el.dataset.i % 3) * 60;
            setTimeout(() => el.classList.add('in'), delay);
            io.unobserve(el);
          }
        });
      }, { threshold: 0.05 });
      items.forEach(el => io.observe(el));

      // ── Lightbox ──
      const lb        = document.getElementById('lightbox');
      const lbImg     = document.getElementById('lb-img');
      const lbCounter = document.getElementById('lb-counter');
      let current = 0;

      function show(pos) {
        current = (pos + shownSrcs.length) % shownSrcs.length;
        lbImg.src = shownSrcs[current];
        lbCounter.textContent = `${current + 1} / ${shownSrcs.length}`;
      }
      function openLb(rawIndex) { show(shown.indexOf(rawIndex)); lb.classList.add('open'); lb.setAttribute('aria-hidden','false'); document.body.style.overflow = 'hidden'; }
      function closeLb() { lb.classList.remove('open'); lb.setAttribute('aria-hidden','true'); document.body.style.overflow = ''; }

      items.forEach(el => el.addEventListener('click', () => openLb(+el.dataset.i)));
      document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); show(current - 1); });
      document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); show(current + 1); });
      document.getElementById('lb-close').addEventListener('click', closeLb);
      lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

      document.addEventListener('keydown', e => {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape')      closeLb();
        if (e.key === 'ArrowLeft')   show(current - 1);
        if (e.key === 'ArrowRight')  show(current + 1);
      });

      // ── Prev / Next project ──
      const idx  = order.indexOf(key);
      const prev = projects[order[(idx - 1 + order.length) % order.length]];
      const prevKey = order[(idx - 1 + order.length) % order.length];
      const next = projects[order[(idx + 1) % order.length]];
      const nextKey = order[(idx + 1) % order.length];
      document.getElementById('project-nav').innerHTML = `
        <a class="pn-prev" href="project.html?p=${prevKey}">
          <span class="pn-label">← Previous</span>
          <span class="pn-name">${prev.name}</span>
        </a>
        <a class="pn-next" href="project.html?p=${nextKey}">
          <span class="pn-label">Next →</span>
          <span class="pn-name">${next.name}</span>
        </a>`;
    }
  </script>

</body>
</html>
